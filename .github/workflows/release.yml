name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Read version & check if release already exists ──
      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag ${{ steps.version.outputs.tag }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag ${{ steps.version.outputs.tag }} is new, proceeding with build."
          fi

      # ── Setup ──
      - name: Setup Node.js
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix node-gyp distutils (Python 3.12+)
        if: steps.check_tag.outputs.exists == 'false'
        run: pip install setuptools

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm install

      - name: Rebuild native modules for Electron
        if: steps.check_tag.outputs.exists == 'false'
        run: npx electron-rebuild -f -w node-pty

      # ── Build ──
      - name: Compile TypeScript (main process)
        if: steps.check_tag.outputs.exists == 'false'
        run: npx tsc -p tsconfig.main.json

      - name: Build Vite (renderer)
        if: steps.check_tag.outputs.exists == 'false'
        run: npx vite build

      - name: Bundle Node.js runtime and CLI tools
        if: steps.check_tag.outputs.exists == 'false'
        run: node scripts/bundle-tools.mjs

      - name: Cache electron-builder binaries
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron-builder\Cache
          key: electron-builder-cache-${{ runner.os }}-nsis

      - name: Package Windows installer
        if: steps.check_tag.outputs.exists == 'false'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx electron-builder --win nsis --config.win.requestedExecutionLevel=asInvoker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      # ── Release ──
      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: release/*.exe
